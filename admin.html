<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — JoinAura</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  body { background: #0a0a0f; color: #e2e8f0; font-family: 'Inter', sans-serif; }
  .glow-btn { background: linear-gradient(135deg, #a855f7, #ec4899); transition: all 0.2s; }
  .glow-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .glass { background: rgba(17,17,24,0.75); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); }
  input, textarea, select { background: #0a0a0f !important; color: #e2e8f0 !important; border-color: #1e1e2e !important; }
  input:focus, textarea:focus, select:focus { outline: none; border-color: rgba(168,85,247,0.6) !important; }
</style>
</head>
<body>
<nav style="background:rgba(17,17,24,0.9);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.06)" class="sticky top-0 z-50">
  <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg glow-btn flex items-center justify-center">
        <svg width="16" height="16" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      </div>
      <span style="font-family:'Playfair Display',serif" class="font-bold text-lg text-white">JoinAura</span>
    </a>
    <div class="flex items-center gap-3">
      <span class="text-xs font-semibold px-3 py-1 rounded-full" style="background:rgba(168,85,247,0.2);border:1px solid rgba(168,85,247,0.4);color:#c084fc">Admin Panel</span>
      <button onclick="signOut()" class="text-gray-400 hover:text-white text-sm px-3 py-2">Sign Out</button>
    </div>
  </div>
</nav>

<main class="max-w-5xl mx-auto px-4 py-8">
  <!-- Auth check -->
  <div id="auth-loading" class="text-center py-20">
    <div class="w-8 h-8 rounded-full border-2 border-purple-500 border-t-transparent animate-spin mx-auto mb-4"></div>
    <p class="text-gray-500">Checking access...</p>
  </div>

  <div id="admin-content" class="hidden">
    <!-- Stats -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
      <div class="p-5 rounded-2xl border border-gray-800 text-center" style="background:#111118">
        <div id="stat-subscribers" class="text-2xl font-bold text-white">—</div>
        <div class="text-gray-500 text-xs mt-1">Active Subscribers</div>
      </div>
      <div class="p-5 rounded-2xl border border-gray-800 text-center" style="background:#111118">
        <div id="stat-posts" class="text-2xl font-bold text-white">—</div>
        <div class="text-gray-500 text-xs mt-1">Total Posts</div>
      </div>
      <div class="p-5 rounded-2xl border border-gray-800 text-center" style="background:#111118">
        <div id="stat-basic" class="text-2xl font-bold text-purple-400">—</div>
        <div class="text-gray-500 text-xs mt-1">Basic Members</div>
      </div>
      <div class="p-5 rounded-2xl border border-gray-800 text-center" style="background:#111118">
        <div id="stat-premium" class="text-2xl font-bold text-yellow-400">—</div>
        <div class="text-gray-500 text-xs mt-1">Premium Members</div>
      </div>
    </div>

    <div class="grid md:grid-cols-2 gap-8">
      <!-- Upload / Create Post -->
      <div>
        <h2 style="font-family:'Playfair Display',serif" class="text-2xl font-bold text-white mb-6">Create New Post</h2>
        <div class="rounded-2xl border border-gray-800 p-6" style="background:#111118">
          <div id="upload-msg" class="hidden mb-4 p-3 rounded-xl text-sm text-center"></div>
          <form id="upload-form" onsubmit="createPost(event)">
            <div class="space-y-4">
              <div>
                <label class="block text-sm text-gray-400 mb-2">Caption</label>
                <textarea id="post-caption" rows="3" placeholder="Write something exclusive..." class="w-full px-4 py-3 rounded-xl text-sm border resize-none">
                </textarea>
              </div>
              <div>
                <label class="block text-sm text-gray-400 mb-2">Media URL (optional)</label>
                <input type="url" id="post-media-url" placeholder="https://..." class="w-full px-4 py-3 rounded-xl text-sm border">
              </div>
              <div>
                <label class="block text-sm text-gray-400 mb-2">Media Type</label>
                <select id="post-media-type" class="w-full px-4 py-3 rounded-xl text-sm border">
                  <option value="image">Image</option>
                  <option value="video">Video</option>
                  <option value="text">Text Only</option>
                </select>
              </div>
              <div class="flex gap-4">
                <div class="flex-1">
                  <label class="block text-sm text-gray-400 mb-2">Access Tier</label>
                  <select id="post-tier" class="w-full px-4 py-3 rounded-xl text-sm border">
                    <option value="basic">Basic</option>
                    <option value="premium">Premium</option>
                  </select>
                </div>
                <div class="flex-1">
                  <label class="block text-sm text-gray-400 mb-2">Lock Content?</label>
                  <select id="post-locked" class="w-full px-4 py-3 rounded-xl text-sm border">
                    <option value="true">Locked (subscribers only)</option>
                    <option value="false">Free (everyone)</option>
                  </select>
                </div>
              </div>
              <button type="submit" id="upload-btn" class="glow-btn w-full text-white font-semibold py-3 rounded-xl text-sm">
                Publish Post
              </button>
            </div>
          </form>

          <div class="mt-6 pt-6 border-t border-gray-800">
            <h3 class="text-sm text-gray-400 mb-3 font-medium">Upload Media to Supabase Storage</h3>
            <input type="file" id="media-file" accept="image/*,video/*" class="w-full text-sm text-gray-400 border border-gray-800 rounded-xl px-3 py-2" style="background:#0a0a0f">
            <button onclick="uploadMedia()" class="mt-3 w-full text-white text-sm font-semibold py-3 rounded-xl border border-gray-700 hover:border-purple-500/50 transition-all">Upload File & Copy URL</button>
            <div id="upload-url" class="hidden mt-3 p-3 rounded-xl text-xs break-all" style="background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.3);color:#c084fc"></div>
          </div>
        </div>
      </div>

      <!-- Posts List -->
      <div>
        <h2 style="font-family:'Playfair Display',serif" class="text-2xl font-bold text-white mb-6">Manage Posts</h2>
        <div id="posts-list" class="space-y-3">
          <div class="text-center py-10 text-gray-500 text-sm">Loading posts...</div>
        </div>
      </div>
    </div>

    <!-- Subscribers -->
    <div class="mt-10">
      <h2 style="font-family:'Playfair Display',serif" class="text-2xl font-bold text-white mb-6">Active Subscribers</h2>
      <div class="rounded-2xl border border-gray-800 overflow-hidden" style="background:#111118">
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr style="border-bottom:1px solid #1e1e2e">
                <th class="text-left px-5 py-4 text-gray-500 font-medium">Email</th>
                <th class="text-left px-5 py-4 text-gray-500 font-medium">Tier</th>
                <th class="text-left px-5 py-4 text-gray-500 font-medium">Status</th>
                <th class="text-left px-5 py-4 text-gray-500 font-medium">Since</th>
              </tr>
            </thead>
            <tbody id="subscribers-table">
              <tr><td colspan="4" class="text-center py-8 text-gray-500">Loading subscribers...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
const SUPABASE_URL = 'https://tzvhfdfphffsqpxnwztu.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR6dmhmZGZwaGZmc3FweG53enR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNzYyNzksImV4cCI6MjA5NTY1MjI3OX0.AInbbSlpEpuDEhQP9I2Qy7I4blpOSCI4Y9e0zi1it5Q';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function init() {
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { window.location.href = 'auth.html'; return; }
  document.getElementById('auth-loading').classList.add('hidden');
  document.getElementById('admin-content').classList.remove('hidden');
  loadStats(); loadPosts(); loadSubscribers();
}

async function loadStats() {
  const { count: subCount } = await supabase.from('subscriptions').select('*', { count: 'exact', head: true }).eq('status', 'active');
  const { count: postCount } = await supabase.from('posts').select('*', { count: 'exact', head: true });
  const { count: basicCount } = await supabase.from('subscriptions').select('*', { count: 'exact', head: true }).eq('status', 'active').eq('tier', 'basic');
  const { count: premiumCount } = await supabase.from('subscriptions').select('*', { count: 'exact', head: true }).eq('status', 'active').eq('tier', 'premium');
  document.getElementById('stat-subscribers').textContent = subCount || 0;
  document.getElementById('stat-posts').textContent = postCount || 0;
  document.getElementById('stat-basic').textContent = basicCount || 0;
  document.getElementById('stat-premium').textContent = premiumCount || 0;
}

async function loadPosts() {
  const { data: posts } = await supabase.from('posts').select('*').order('created_at', { ascending: false }).limit(20);
  const container = document.getElementById('posts-list');
  if (!posts || posts.length === 0) { container.innerHTML = '<div class="text-center py-10 text-gray-500 text-sm">No posts yet.</div>'; return; }
  container.innerHTML = posts.map(p => `
    <div class="p-4 rounded-xl border border-gray-800 flex items-start justify-between gap-3" style="background:#0a0a0f">
      <div class="flex-1 min-w-0">
        <p class="text-white text-sm truncate">${p.caption || '(no caption)'}</p>
        <div class="flex items-center gap-2 mt-1">
          <span class="text-xs px-2 py-0.5 rounded-full ${p.tier_required === 'premium' ? 'text-yellow-400' : 'text-purple-400'}" style="background:rgba(168,85,247,0.1)">${p.tier_required}</span>
          <span class="text-xs ${p.is_locked ? 'text-red-400' : 'text-green-400'}">${p.is_locked ? '🔒 locked' : '🔓 free'}</span>
          <span class="text-gray-600 text-xs">${new Date(p.created_at).toLocaleDateString()}</span>
        </div>
      </div>
      <div class="flex gap-2 flex-shrink-0">
        <button onclick="toggleLock('${p.id}', ${!p.is_locked})" class="text-xs px-3 py-1.5 rounded-lg border border-gray-700 text-gray-400 hover:text-white transition-colors">Toggle Lock</button>
        <button onclick="deletePost('${p.id}')" class="text-xs px-3 py-1.5 rounded-lg text-red-400 hover:bg-red-500/10 transition-colors">Delete</button>
      </div>
    </div>
  `).join('');
}

async function loadSubscribers() {
  const { data: subs } = await supabase.from('subscriptions').select('*, user_profiles(email)').eq('status', 'active').order('created_at', { ascending: false });
  const tbody = document.getElementById('subscribers-table');
  if (!subs || subs.length === 0) { tbody.innerHTML = '<tr><td colspan="4" class="text-center py-8 text-gray-500">No subscribers yet.</td></tr>'; return; }
  tbody.innerHTML = subs.map(s => `
    <tr style="border-bottom:1px solid #1e1e2e">
      <td class="px-5 py-3 text-gray-300">${s.user_profiles?.email || s.user_id.substring(0,8) + '...'}</td>
      <td class="px-5 py-3"><span class="text-xs px-2 py-1 rounded-full ${s.tier === 'premium' ? 'text-yellow-400' : 'text-purple-400'}" style="background:rgba(168,85,247,0.1)">${s.tier}</span></td>
      <td class="px-5 py-3"><span class="text-xs text-green-400">${s.status}</span></td>
      <td class="px-5 py-3 text-gray-500 text-xs">${new Date(s.created_at).toLocaleDateString()}</td>
    </tr>
  `).join('');
}

async function createPost(e) {
  e.preventDefault();
  const btn = document.getElementById('upload-btn');
  btn.textContent = 'Publishing...'; btn.disabled = true;
  const { error } = await supabase.from('posts').insert({
    caption: document.getElementById('post-caption').value,
    media_url: document.getElementById('post-media-url').value || null,
    media_type: document.getElementById('post-media-type').value,
    tier_required: document.getElementById('post-tier').value,
    is_locked: document.getElementById('post-locked').value === 'true',
    is_published: true
  });
  const msg = document.getElementById('upload-msg');
  msg.classList.remove('hidden');
  if (error) { msg.style.background='rgba(239,68,68,0.1)'; msg.style.color='#f87171'; msg.textContent = 'Error: ' + error.message; }
  else { msg.style.background='rgba(34,197,94,0.1)'; msg.style.color='#4ade80'; msg.textContent = '✓ Post published successfully!'; e.target.reset(); loadPosts(); loadStats(); }
  btn.textContent = 'Publish Post'; btn.disabled = false;
}

async function uploadMedia() {
  const file = document.getElementById('media-file').files[0];
  if (!file) { alert('Select a file first'); return; }
  const ext = file.name.split('.').pop();
  const filename = Date.now() + '.' + ext;
  const { data, error } = await supabase.storage.from('creator-media').upload(filename, file, { cacheControl: '3600', upsert: false });
  if (error) { alert('Upload error: ' + error.message); return; }
  const { data: { publicUrl } } = supabase.storage.from('creator-media').getPublicUrl(filename);
  const urlDiv = document.getElementById('upload-url');
  urlDiv.classList.remove('hidden');
  urlDiv.textContent = publicUrl;
  document.getElementById('post-media-url').value = publicUrl;
}

async function toggleLock(id, locked) {
  await supabase.from('posts').update({ is_locked: locked }).eq('id', id);
  loadPosts();
}

async function deletePost(id) {
  if (!confirm('Delete this post?')) return;
  await supabase.from('posts').delete().eq('id', id);
  loadPosts(); loadStats();
}

async function signOut() { await supabase.auth.signOut(); window.location.href = 'index.html'; }

init();
</script>
</body>
</html>
